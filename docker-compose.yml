services:

  # ── 1. MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: assn27_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - assn27_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 2. Unified App (React + Express) ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assn27_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/assignment27
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - assn27_net

networks:
  assn27_net:
    driver: bridge

volumes:
  mongo_data:
    driver: local
